# Netlify build configuration.
# Pin Node so Vite 7 (requires Node ^20.19 || >=22.12) builds successfully.
# Without this pin the deploy used an older default Node and failed in ~17s.
[build]
  command = "yarn build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# O PT canônico vive na raiz ('/'); '/pt' existe como alias e redireciona de
# forma permanente para a versão canônica — sem conteúdo duplicado nem loop.
[[redirects]]
  from = "/pt"
  to = "/"
  status = 301

[[redirects]]
  from = "/pt/*"
  to = "/:splat"
  status = 301
